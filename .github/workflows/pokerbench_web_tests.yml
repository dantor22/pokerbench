name: PokerBench Web Tests

on:
  push:
    branches: [ main, master ]
    paths:
      - 'pokerbench-web/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'pokerbench-web/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: pokerbench-web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: pokerbench-web

      - name: Run tests
        run: npm test
        working-directory: pokerbench-web
